<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" fill="none" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">OpenClawCN Logo</title>
  <desc id="logoDesc">OpenClawCN 正式网站 logo，包含图形徽记与中文资料站字标。</desc>
  <defs>
    <linearGradient id="logoBg" x1="22" y1="18" x2="122" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13817D"/>
      <stop offset="1" stop-color="#163938"/>
    </linearGradient>
    <linearGradient id="logoStroke" x1="34" y1="24" x2="111" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0DFC2"/>
      <stop offset="1" stop-color="#C28B44"/>
    </linearGradient>
    <linearGradient id="logoClaw" x1="76" y1="40" x2="112" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFD29E"/>
      <stop offset="1" stop-color="#A66F2C"/>
    </linearGradient>
    <filter id="logoShadow" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="12"/>
      <feGaussianBlur stdDeviation="10"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0862745 0 0 0 0 0.176471 0 0 0 0 0.172549 0 0 0 0.24 0"/>
      <feBlend in2="SourceGraphic" result="shape"/>
    </filter>
  </defs>

  <g filter="url(#logoShadow)">
    <rect x="18" y="18" width="108" height="108" rx="28" fill="url(#logoBg)"/>
    <rect x="21.5" y="21.5" width="101" height="101" rx="24.5" stroke="url(#logoStroke)" stroke-opacity=".45"/>
    <path d="M83.6 37.7C78.4 33.1 71.6 30.3 64.1 30.3C47.9 30.3 34.8 43.4 34.8 59.6C34.8 75.8 47.9 88.9 64.1 88.9C71.5 88.9 78.3 86.2 83.4 81.8" stroke="#F8F3E9" stroke-width="8" stroke-linecap="round"/>
    <path d="M74.2 45.2L100.6 35.1" stroke="url(#logoClaw)" stroke-width="6.4" stroke-linecap="round"/>
    <path d="M78.8 59.7L105.2 49.6" stroke="url(#logoClaw)" stroke-width="6.4" stroke-linecap="round"/>
    <path d="M74.4 74L100.8 84.3" stroke="url(#logoClaw)" stroke-width="6.4" stroke-linecap="round"/>
    <circle cx="64.1" cy="59.6" r="38.4" stroke="rgba(248,243,233,.08)" stroke-width="1.5"/>
  </g>

  <g transform="translate(162 40)">
    <text x="0" y="38" fill="#1D221D" font-size="46" font-weight="700" font-family="Fraunces, 'Times New Roman', serif" letter-spacing="-1.4">
      OpenClawCN
    </text>
    <text x="2" y="74" fill="#526052" font-size="15" font-weight="700" font-family="Manrope, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" letter-spacing="4">
      OPENCLAW CHINESE KNOWLEDGE HUB
    </text>
    <path d="M2 94H278" stroke="url(#logoClaw)" stroke-opacity=".7" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="124" fill="#526052" font-size="22" font-weight="600" font-family="Manrope, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
      中文资料站
    </text>
    <text x="122" y="124" fill="#8A7657" font-size="18" font-weight="600" font-family="Manrope, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
      Docs · News · Practices
    </text>
  </g>
</svg>
